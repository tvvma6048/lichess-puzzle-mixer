name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Build Linux amd64
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/lichess-puzzle-mixer-linux-amd64 .

      - name: Build Windows amd64
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/lichess-puzzle-mixer-windows-amd64.exe .

      - name: Package archives
        run: |
          cd dist
          tar czf lichess-puzzle-mixer-linux-amd64.tar.gz lichess-puzzle-mixer-linux-amd64
          zip -q lichess-puzzle-mixer-windows-amd64.zip lichess-puzzle-mixer-windows-amd64.exe
          sha256sum lichess-puzzle-mixer-linux-amd64.tar.gz lichess-puzzle-mixer-windows-amd64.zip > SHA256SUMS

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/lichess-puzzle-mixer-linux-amd64.tar.gz
            dist/lichess-puzzle-mixer-windows-amd64.zip
            dist/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
