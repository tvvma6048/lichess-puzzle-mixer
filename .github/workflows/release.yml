name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Build Linux amd64
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/lichess-puzzle-mixer-linux-amd64 .

      - name: Build Windows amd64
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/lichess-puzzle-mixer-windows-amd64.exe .

      - name: Build macOS (Intel)
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dist/lichess-puzzle-mixer-macos-amd64 .

      - name: Build macOS (Apple Silicon)
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dist/lichess-puzzle-mixer-macos-arm64 .

      - name: Package archives
        run: |
          cd dist
          tar czf lichess-puzzle-mixer-linux-amd64.tar.gz lichess-puzzle-mixer-linux-amd64
          zip -q lichess-puzzle-mixer-windows-amd64.zip lichess-puzzle-mixer-windows-amd64.exe
          tar czf lichess-puzzle-mixer-macos-amd64.tar.gz lichess-puzzle-mixer-macos-amd64
          tar czf lichess-puzzle-mixer-macos-arm64.tar.gz lichess-puzzle-mixer-macos-arm64
          sha256sum lichess-puzzle-mixer-*.tar.gz lichess-puzzle-mixer-*.zip > SHA256SUMS

      - name: Release notes from CHANGELOG.md
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}"
          chmod +x scripts/release-notes.sh
          scripts/release-notes.sh "$TAG" > dist/RELEASE_NOTES.md
          echo "---" >> dist/RELEASE_NOTES.md
          echo "" >> dist/RELEASE_NOTES.md
          echo "**[Full changelog](https://github.com/${{ github.repository }}/blob/master/CHANGELOG.md)**" >> dist/RELEASE_NOTES.md

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          body_path: dist/RELEASE_NOTES.md
          files: |
            dist/lichess-puzzle-mixer-linux-amd64.tar.gz
            dist/lichess-puzzle-mixer-windows-amd64.zip
            dist/lichess-puzzle-mixer-macos-amd64.tar.gz
            dist/lichess-puzzle-mixer-macos-arm64.tar.gz
            dist/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
